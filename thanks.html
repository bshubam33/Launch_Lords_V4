<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Launch Lords</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .thank-you-container {
            max-width: 600px;
            padding: 3rem;
            animation: fadeUp 1s ease-out forwards;
            position: relative;
            z-index: 10;
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .icon {
            width: 80px;
            height: 80px;
            color: var(--accent-gold);
            animation: pulse 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(212, 184, 134, 0.4));
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.125rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Subtle Background Glow */
        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 184, 134, 0.08) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: auto;
            text-decoration: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                filter: drop-shadow(0 0 20px rgba(212, 184, 134, 0.6));
            }

            100% {
                transform: scale(1);
                opacity: 0.9;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="thank-you-container">
        <div class="icon-container">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>
        <h1>Submission Received</h1>
        <p>Thank you for reaching out to us. Launch Lords will be in touch with you shortly.</p>

        <a href="index.html" class="btn btn-primary btn-home">
            <span style="transform: scaleX(-1);">→</span> Return to Website
        </a>
    </div>
</body>

</html>
